<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Svenni 🎉</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="sky">
    <div class="glow"></div>
  </div>

  <main class="stage">
    <button class="opener" id="scene" aria-label="Avaa syntymäpäiväkortti">
      <span class="opener-emoji">💌</span>
    </button>
    <p class="hint" id="hint">Click to open</p>

    <div class="card" id="card">
      <div class="card-inner">
        <div class="balloons">
          <span class="balloon b1"></span>
          <span class="balloon b2"></span>
          <span class="balloon b3"></span>
        </div>
        <p class="card-eyebrow">Happy Birthday</p>
        <h1 class="card-name">Svenni</h1>
        <div class="cake">🎂</div>
        <pre class="code-block"><span class="k">while</span> (alive) {
  <span class="fn">celebrate</span>(<span class="s">"Svenni"</span>);
  age<span class="op">++</span>;
}</pre>
        <p class="card-msg" id="cardMsg">
          Wishing you the most wonderful day, full of laughter, cake and
          everything amazing. Happy birthday! 🥂
        </p>
        <p class="card-sign">Cheers! 💛</p>
      </div>
      <button class="replay" id="replay">↺ Replay</button>
    </div>
  </main>

  <canvas id="confetti"></canvas>
  <script src="script.js"></script>
</body>
</html>
